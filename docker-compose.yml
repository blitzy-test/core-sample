version: '3.8'

services:
  # PostgreSQL 17.4 Database Service
  postgres:
    image: postgres:17.4
    container_name: core-sample-postgres
    environment:
      POSTGRES_USER: briklabs
      POSTGRES_PASSWORD: briklabs
      POSTGRES_DB: sample
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Mount initialization scripts for schema creation
      - ./backend/src/main/resources/sql/common:/docker-entrypoint-initdb.d/common
      - ./backend/src/main/resources/sql/payment:/docker-entrypoint-initdb.d/payment
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U briklabs -d sample"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - core-sample-network

  # Backend Java Service with Payment Module
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: core-sample-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # JVM Configuration
      JAVA_OPTS: "-Xms512m -Xmx1024m -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -Dlogback.configurationFile=/brik/config/logback.xml"
      # HikariCP Configuration
      HIKARI_CONFIG: "/brik/config/hikari-config.properties"
      # Application Configuration
      BRIK_CONFIG: "/brik/config/config.yaml"
      # Payment Module Configuration
      PAYMENT_CONFIG: "/brik/config/payment-config.yaml"
    volumes:
      - ./backend/config.yaml:/brik/config/config.yaml
      - ./backend/hikari-config.properties:/brik/config/hikari-config.properties
      - ./backend/payment-config.yaml:/brik/config/payment-config.yaml
      - ./backend/payment-logging.xml:/brik/config/payment-logging.xml
    ports:
      - "5900:5900"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5900/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - core-sample-network

  # Frontend Service with Vite
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: core-sample-frontend
    depends_on:
      backend:
        condition: service_healthy
    environment:
      # API Configuration
      VITE_API_URL: "http://localhost:5900"
      # Development Mode
      NODE_ENV: "development"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - node_modules:/app/node_modules
    ports:
      - "3000:3000"
    networks:
      - core-sample-network

networks:
  core-sample-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  node_modules:
    driver: local