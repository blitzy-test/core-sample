# HikariCP Connection Pool Configuration for Payment Transaction Processing
# Version: 1.0
# This configuration is optimized for payment transaction processing as specified in section 6.2.2.3

# Core Pool Settings
maximumPoolSize=30
minimumIdle=10
connectionTimeout=20000
idleTimeout=300000
maxLifetime=1200000

# Connection Test Settings
connectionTestQuery=SELECT 1
validationTimeout=5000

# Transaction Settings
autoCommit=false
transactionIsolation=TRANSACTION_READ_COMMITTED

# Resource Management
leakDetectionThreshold=60000

# Pool Naming for Monitoring
poolName=PaymentHikariPool

# Monitoring and Management
registerMbeans=true
allowPoolSuspension=false

# Performance Tuning
keepaliveTime=0
initializationFailTimeout=1
isolateInternalQueries=false