# HikariCP Connection Pool Configuration for Payments Module

# Core Pool Settings
# Maximum number of connections in the pool (optimized for payment transaction volume)
maximumPoolSize=30

# Minimum number of idle connections to maintain in the pool
minimumIdle=10

# Connection Timeouts
# Maximum time to wait for a connection from the pool (in milliseconds)
connectionTimeout=20000

# Maximum time a connection can sit idle in the pool (in milliseconds)
idleTimeout=300000

# Maximum lifetime of a connection in the pool (in milliseconds)
maxLifetime=1200000

# Connection Testing
# Query used to validate connections from the pool
connectionTestQuery=SELECT 1

# Leak Detection
# Threshold for connection leak detection (in milliseconds)
leakDetectionThreshold=60000

# Transaction Isolation
# Default transaction isolation level
transactionIsolation=TRANSACTION_READ_COMMITTED

# Auto-commit behavior (disabled for explicit transaction control)
autoCommit=false

# Performance Optimizations
# Prepared statement cache size per connection
prepStmtCacheSize=250

# Maximum length of a prepared SQL statement that will be cached
prepStmtCacheSqlLimit=2048

# Cache prepared statements
cachePrepStmts=true

# Monitoring
# Register JMX management beans for monitoring
registerMbeans=true

# Pool name for identification in monitoring systems
poolName=PaymentHikariPool

# Connection initialization
# Initialize connections eagerly rather than lazily
initializationFailTimeout=1

# Validation timeout (in milliseconds)
validationTimeout=5000

# Allow pool suspension
allowPoolSuspension=false

# Read-only connections handling
readOnly=false

# Catalog to use for connections
catalog=public

# Connection initialization SQL
# connectionInitSql=SET search_path TO sample

# Isolation level enforcement
isolateInternalQueries=false

# Keep alive SQL to prevent connection timeouts
keepaliveTime=0