# HikariCP Connection Pool Configuration for Payment Processing
# Optimized for high-volume payment transaction processing with PostgreSQL 17.4

# Pool Configuration
poolName=PaymentHikariPool
maximumPoolSize=30
minimumIdle=10
connectionTimeout=20000
idleTimeout=300000
maxLifetime=1200000

# Connection Testing
connectionTestQuery=SELECT 1
validationTimeout=5000
leakDetectionThreshold=60000

# Transaction Management
autoCommit=false
transactionIsolation=TRANSACTION_READ_COMMITTED

# Performance Tuning
keepaliveTime=30000
initializationFailTimeout=10000

# Monitoring and Metrics
registerMbeans=true
allowPoolSuspension=false
metricsTrackerFactory=com.zaxxer.hikari.metrics.prometheus.PrometheusMetricsTrackerFactory

# Connection Health
healthCheckRegistry=io.briklabs.sample.payments.data.health.PaymentHealthRegistry
healthCheckProperties.connectivityCheckEnabled=true
healthCheckProperties.connectivityCheckTimeoutMs=5000

# PostgreSQL Specific Settings
dataSource.cachePrepStmts=true
dataSource.prepStmtCacheSize=250
dataSource.prepStmtCacheSqlLimit=2048
dataSource.useServerPrepStmts=true