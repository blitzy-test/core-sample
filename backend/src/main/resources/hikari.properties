# HikariCP Connection Pool Configuration for Payment Processing
# Optimized for high-volume payment transaction processing with appropriate
# connection management settings for reliability and performance.

# Pool Sizing Configuration
# Increased from default 10 to support payment transaction volume
maximumPoolSize=30
# Maintain sufficient idle connections for immediate payment processing
minimumIdle=10

# Connection Timing Configuration
# Maximum time to wait for a connection from the pool
connectionTimeout=20000
# Maximum time a connection can sit idle before being retired
idleTimeout=300000
# Maximum lifetime of a connection in the pool
maxLifetime=1200000

# Connection Testing Configuration
# Query used to validate connections before use
connectionTestQuery=SELECT 1
# Timeout for connection validation query
validationTimeout=5000

# Connection Leak Detection
# Enable leak detection with 60 second threshold
leakDetectionThreshold=60000

# Pool Naming for Monitoring and Troubleshooting
poolName=PaymentHikariPool

# Transaction Isolation Level
# TRANSACTION_READ_COMMITTED provides a good balance between consistency and performance
transactionIsolation=TRANSACTION_READ_COMMITTED

# Auto-commit Setting
# Disabled to allow explicit transaction control for payment operations
autoCommit=false

# Connection Initialization
# Initialize connections with specific session parameters
connectionInitSql=SET application_name='payment-service'; SET statement_timeout=30000;

# Health Check Properties
# Enable health checks to detect broken connections
healthCheckProperties.connectivityCheckTimeoutMs=1000
healthCheckProperties.expected99thPercentileMs=10

# Pool Suspension
# Allow pool suspension during database maintenance
allowPoolSuspension=true

# Register JMX monitoring for operational visibility
registerMbeans=true

# Connection Initialization Failure Handling
# Fail fast if initial connection creation fails
initializationFailTimeout=1

# Maximum number of milliseconds that a client will wait for a connection
# This is for the case where the pool is exhausted and the caller is waiting
loginTimeout=30000

# Keep Alive Configuration
# Keep connections alive with periodic validation
keepaliveTime=300000

# Metrics Tracking
# Enable metrics tracking for monitoring
metricsTrackerFactory=com.zaxxer.hikari.metrics.prometheus.PrometheusMetricsTrackerFactory

# Connection Quality Checks
# Minimum idle time before a connection is eligible for eviction
minEvictableIdleTimeMillis=120000
# Time between eviction runs
evictionRunsMillis=60000