brik:
  database:
    sample:
      url: jdbc:postgresql://localhost:5432/sample?currentSchema=sample
      user: briklabs
      password: briklabs
      schema: sample,payment
      version: 17.4
      hikaricp:
        configurationFile: ${HIKARI_CONFIG:hikari-config.properties}
  
  payment:
    enabled: true
    configFile: ${PAYMENT_CONFIG:payment-config.yaml}
    accessRights:
      enabled: true
      integration:
        endpoint: /api/access-rights
        timeout: 5000
        retryAttempts: 3
  
  logging:
    root:
      level: ${log.root.level:-INFO}
    briklabs:
      level: ${log.briklabs.level:-INFO}
    payment:
      level: ${log.payment.level:-INFO}
      configFile: payment-logging.xml